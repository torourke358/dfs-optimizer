name: Keep backend awake

# Render's free tier spins the service down after ~15 minutes of no traffic,
# which puts a ~50s cold start in front of the next visitor. A ping every
# 10 minutes keeps it warm. (GitHub disables scheduled workflows after 60 days
# without repo activity — re-enable from the Actions tab if that happens.)

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sf --max-time 90 --retry 3 --retry-all-errors \
            https://dfs-optimizer-pqbi.onrender.com/api/health
